<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bølgesuperposition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════
     TEMA — MØRKT (default)
  ═══════════════════════════════════════════════════ */
  :root {
    --bg:        #0a0c14;
    --panel:     #0f1320;
    --border:    #1e2a3a;
    --accent:    #00e5ff;
    --readout:   #a8ff3e;
    --readout-glow: 0 0 8px rgba(168,255,62,0.5);
    --text:      #c8d8e8;
    --text-dim:  #7d94a8;

    --canvas-bg: #060a12;
    --grid-line: rgba(0,229,255,0.035);
    --grid-axis: rgba(0,229,255,0.12);

    --wave1:     #00e5ff;
    --wave2:     #ff6b35;
    --result:    #a8ff3e;
    --node:      #ffd600;
    --anti:      #ea80fc;

    --btn-bg:    rgba(0,229,255,0.08);
    --btn-bg-hover: rgba(0,229,255,0.18);
    --shadow-glow: 0 0 50px rgba(0,229,255,0.06);

    --font-weight-body: 300;
  }

  /* ═══════════════════════════════════════════════════
     TEMA — LYST
  ═══════════════════════════════════════════════════ */
  body.light {
    --bg:        #e8e0d2;
    --panel:     #f4eee3;
    --border:    #d6cbb8;
    --accent:    #2767a8;
    --readout:   #1D9E75;
    --readout-glow: none;
    --text:      #1a1a1a;
    --text-dim:  #5a4a38;

    --canvas-bg: #faf5ea;
    --grid-line: rgba(39,103,168,0.07);
    --grid-axis: rgba(39,103,168,0.22);

    --wave1:     #2767a8;
    --wave2:     #c4501a;
    --result:    #1D9E75;
    --node:      #b8860b;
    --anti:      #8e3a9e;

    --btn-bg:    rgba(39,103,168,0.08);
    --btn-bg-hover: rgba(39,103,168,0.18);
    --shadow-glow: 0 0 40px rgba(39,103,168,0.05);

    --font-weight-body: 500;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-weight: var(--font-weight-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 14px 24px;
    transition: background 0.3s, color 0.3s;
  }

  /* ═══════════════════════════════════════════════════
     HEADER
  ═══════════════════════════════════════════════════ */
  header {
    width: 100%; max-width: 820px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .title-wrap { display: flex; align-items: center; gap: 12px; }

  .wave-icon {
    width: 32px; height: 22px;
    animation: pulse 1.8s ease-in-out infinite;
  }
  .wave-icon path {
    stroke: var(--accent);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
  }
  body:not(.light) .wave-icon path {
    filter: drop-shadow(0 0 4px var(--accent));
  }
  @keyframes pulse {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(0.55); }
  }

  .title-text h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent);
    line-height: 1;
  }
  body:not(.light) .title-text h1 {
    text-shadow: 0 0 14px rgba(0,229,255,0.45);
  }
  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; color: var(--text-dim);
    letter-spacing: 0.22em; margin-top: 3px;
  }

  .header-btns { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--btn-bg);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 3px;
    cursor: pointer; transition: all 0.18s;
  }
  body:not(.light) .icon-btn {
    text-shadow: 0 0 6px rgba(0,229,255,0.4);
    box-shadow: 0 0 6px rgba(0,229,255,0.1), inset 0 0 6px rgba(0,229,255,0.03);
  }
  .icon-btn:hover {
    background: var(--btn-bg-hover);
  }
  body:not(.light) .icon-btn:hover {
    box-shadow: 0 0 14px rgba(0,229,255,0.28);
  }

  /* ═══════════════════════════════════════════════════
     CANVAS
  ═══════════════════════════════════════════════════ */
  .canvas-wrap { position: relative; width: 100%; max-width: 820px; }

  canvas {
    display: block; width: 100%;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--canvas-bg);
    box-shadow: var(--shadow-glow), inset 0 0 60px rgba(0,0,0,0.25);
  }
  body.light canvas {
    box-shadow: var(--shadow-glow), inset 0 0 40px rgba(120,90,50,0.06);
  }

  #phaseBadge {
    position: absolute; top: 10px; right: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.14em;
    padding: 3px 10px; border-radius: 2px;
    border: 1px solid currentColor;
    background: var(--canvas-bg);
    transition: color 0.4s;
    pointer-events: none;
  }

  /* ═══════════════════════════════════════════════════
     LEGEND
  ═══════════════════════════════════════════════════ */
  .legend {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 10px 22px; margin: 10px 0 14px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.7rem; font-weight: var(--font-weight-body);
    letter-spacing: 0.04em; color: var(--text-dim);
  }
  body.light .legend { color: var(--text); font-weight: 600; }
  .leg { display: flex; align-items: center; gap: 7px; }
  .leg-line { width: 26px; height: 2px; border-radius: 1px; }
  .leg-diamond {
    width: 8px; height: 8px; flex-shrink: 0;
    background: var(--node); transform: rotate(45deg);
  }
  body:not(.light) .leg-diamond { box-shadow: 0 0 6px var(--node); }
  .leg-circle {
    width: 9px; height: 9px; flex-shrink: 0;
    border-radius: 50%; background: var(--anti);
  }
  body:not(.light) .leg-circle { box-shadow: 0 0 7px var(--anti); }

  /* ═══════════════════════════════════════════════════
     CONTROLS
  ═══════════════════════════════════════════════════ */
  .controls {
    background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    width: 100%; max-width: 820px;
  }
  .wave-box {
    border: 1px solid var(--border); border-radius: 4px;
    padding: 10px 12px;
  }
  .wave-box h3 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem; font-weight: 400;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding-bottom: 7px; margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .w1 h3 .arrow { color: var(--wave1); font-size: 0.9rem; }
  .w2 h3 .arrow { color: var(--wave2); font-size: 0.9rem; }
  .w1 h3 .lbl { color: var(--wave1); }
  .w2 h3 .lbl { color: var(--wave2); }
  body:not(.light) .w1 h3 .lbl { text-shadow: 0 0 7px rgba(0,229,255,0.35); }
  body:not(.light) .w2 h3 .lbl { text-shadow: 0 0 7px rgba(255,107,53,0.35); }

  .ctrl-row { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
  .ctrl-row label {
    font-family: 'Exo 2', sans-serif;
    font-size: 0.72rem; color: var(--text-dim);
    font-weight: var(--font-weight-body);
    width: 80px; flex-shrink: 0;
  }
  body.light .ctrl-row label { color: var(--text); font-weight: 600; }

  input[type=range] { flex: 1; height: 3px; cursor: pointer; border-radius: 2px; }
  .w1 input[type=range] { accent-color: var(--wave1); }
  .w2 input[type=range] { accent-color: var(--wave2); }

  .val {
    font-family: 'Courier New', monospace;
    font-size: 0.78rem; font-weight: 700;
    color: var(--readout);
    width: 36px; text-align: right; flex-shrink: 0;
  }
  body:not(.light) .val { text-shadow: var(--readout-glow); }

  /* ═══════════════════════════════════════════════════
     BOTTOM BAR
  ═══════════════════════════════════════════════════ */
  .bottom-bar {
    grid-column: 1 / -1;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 10px 14px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .btn-group { display: flex; gap: 8px; }

  button.action {
    background: var(--btn-bg);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 3px;
    cursor: pointer; transition: all 0.18s;
  }
  body:not(.light) button.action {
    text-shadow: 0 0 8px rgba(0,229,255,0.45);
    box-shadow: 0 0 8px rgba(0,229,255,0.12), inset 0 0 8px rgba(0,229,255,0.04);
  }
  button.action:hover { background: var(--btn-bg-hover); }
  body:not(.light) button.action:hover {
    box-shadow: 0 0 18px rgba(0,229,255,0.3), inset 0 0 10px rgba(0,229,255,0.08);
  }

  .sep { flex: 1; min-width: 4px; }

  .sp-row { display: flex; align-items: center; gap: 9px; }
  .sp-row label {
    font-family: 'Exo 2', sans-serif;
    font-size: 0.72rem; color: var(--text-dim);
    font-weight: var(--font-weight-body);
    white-space: nowrap;
  }
  body.light .sp-row label { color: var(--text); font-weight: 600; }
  .sp-row input[type=range] { width: 100px; flex: none; accent-color: var(--accent); }

  .check-row {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.72rem; color: var(--text-dim);
    font-weight: var(--font-weight-body);
    cursor: pointer; white-space: nowrap;
  }
  body.light .check-row { color: var(--text); font-weight: 600; }
  .check-row input[type=checkbox] {
    accent-color: var(--accent);
    width: 14px; height: 14px; cursor: pointer; flex: none;
  }
  .check-row:hover { color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="title-wrap">
    <svg class="wave-icon" viewBox="0 0 32 22">
      <path d="M 1 11 Q 5 1, 9 11 T 17 11 T 25 11 T 33 11"/>
    </svg>
    <div class="title-text">
      <h1>Bølgesuperposition</h1>
      <p class="subtitle">Interferens &amp; stående bølger</p>
    </div>
  </div>
  <div class="header-btns">
    <button class="icon-btn" id="copyBtn">⧉ Kopier kode</button>
    <button class="icon-btn" id="themeBtn">☼ Lys tema</button>
  </div>
</header>

<div class="canvas-wrap">
  <canvas id="cv"></canvas>
  <span id="phaseBadge">BØLGERNE NÆRMER SIG ▶◀</span>
</div>

<div class="legend">
  <div class="leg">
    <div class="leg-line" id="legLine1"></div>
    <span>Bølge&nbsp;1&nbsp;(→)</span>
  </div>
  <div class="leg">
    <div class="leg-line" id="legLine2"></div>
    <span>Bølge&nbsp;2&nbsp;(←)</span>
  </div>
  <div class="leg">
    <div class="leg-line" id="legLineR" style="height:3px"></div>
    <span>Superposition</span>
  </div>
  <div class="leg"><div class="leg-diamond"></div><span>Knudepunkt</span></div>
  <div class="leg"><div class="leg-circle"></div><span>Bug</span></div>
</div>

<div class="controls">
  <div class="wave-box w1">
    <h3><span class="arrow">▶</span><span class="lbl">Bølge 1</span></h3>
    <div class="ctrl-row">
      <label>Amplitude</label>
      <input type="range" id="a1" min="1" max="10" value="5" step="1">
      <span class="val" id="a1v">5</span>
    </div>
    <div class="ctrl-row">
      <label>Frekvens</label>
      <input type="range" id="f1" min="1" max="6" value="3" step="1">
      <span class="val" id="f1v">3</span>
    </div>
  </div>

  <div class="wave-box w2">
    <h3><span class="arrow">◀</span><span class="lbl">Bølge 2</span></h3>
    <div class="ctrl-row">
      <label>Amplitude</label>
      <input type="range" id="a2" min="1" max="10" value="5" step="1">
      <span class="val" id="a2v">5</span>
    </div>
    <div class="ctrl-row">
      <label>Frekvens</label>
      <input type="range" id="f2" min="1" max="6" value="3" step="1">
      <span class="val" id="f2v">3</span>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="btn-group">
      <button class="action" id="playBtn">▶ Afspil</button>
      <button class="action" id="resetBtn">↺ Nulstil</button>
    </div>

    <div class="sep"></div>

    <label class="check-row">
      <input type="checkbox" id="showInd">
      Vis individuelle bølger
    </label>

    <div class="sep"></div>

    <div class="sp-row">
      <label>Animationsfart</label>
      <input type="range" id="sp" min="0.1" max="3" value="0.5" step="0.1">
      <span class="val" id="spv">0,5</span>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DANSK FORMATERING
═══════════════════════════════════════════════════ */
function fmtDk(x, dec) {
  return Number(x).toFixed(dec).replace('.', ',');
}

/* ═══════════════════════════════════════════════════
   TEMA-STYRING
═══════════════════════════════════════════════════ */
const themeBtn = document.getElementById('themeBtn');

/* Læs CSS-variabler — opdateres ved tema-skift */
let COL = {};
function refreshThemeColors() {
  const cs = getComputedStyle(document.body);
  COL.wave1   = cs.getPropertyValue('--wave1').trim();
  COL.wave2   = cs.getPropertyValue('--wave2').trim();
  COL.result  = cs.getPropertyValue('--result').trim();
  COL.node    = cs.getPropertyValue('--node').trim();
  COL.anti    = cs.getPropertyValue('--anti').trim();
  COL.grid    = cs.getPropertyValue('--grid-line').trim();
  COL.axis    = cs.getPropertyValue('--grid-axis').trim();
  // Opdatér legende-streger
  document.getElementById('legLine1').style.background = COL.wave1;
  document.getElementById('legLine2').style.background = COL.wave2;
  document.getElementById('legLineR').style.background = COL.result;
  if (!document.body.classList.contains('light')) {
    document.getElementById('legLine1').style.boxShadow = `0 0 5px ${COL.wave1}`;
    document.getElementById('legLine2').style.boxShadow = `0 0 5px ${COL.wave2}`;
    document.getElementById('legLineR').style.boxShadow = `0 0 6px ${COL.result}`;
  } else {
    document.getElementById('legLine1').style.boxShadow = 'none';
    document.getElementById('legLine2').style.boxShadow = 'none';
    document.getElementById('legLineR').style.boxShadow = 'none';
  }
}
refreshThemeColors();

function applyTheme(light) {
  document.body.classList.toggle('light', light);
  themeBtn.textContent = light ? '☾ Mørkt tema' : '☼ Lys tema';
  try { localStorage.setItem('boelge-theme', light ? 'light' : 'dark'); } catch(e) {}
  refreshThemeColors();
}
themeBtn.addEventListener('click', () => {
  applyTheme(!document.body.classList.contains('light'));
});
try {
  if (localStorage.getItem('boelge-theme') === 'light') applyTheme(true);
} catch(e) {}

/* ═══════════════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════════════ */
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 820, H = 270;
cv.width = W; cv.height = H;
const CY = H / 2;

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const DEF = { A1: 5, A2: 5, F1: 3, F2: 3, SPEED: 0.5 };
let A1 = DEF.A1, A2 = DEF.A2;
let F1 = DEF.F1, F2 = DEF.F2;
let SPEED = DEF.SPEED;

const RATE = 0.22;               // OSC === TRAVEL (kalibreret tempo)
let t = 0;
let front1, front2;
let playing = false;
let lastTs = null;
let showIndividual = false;

function initFronts() {
  front1 = W / (2 * F1);         // garanterer nul-krydsning ved fronten
  front2 = W - W / (2 * F2);
  t = 0;
}
initFronts();

const ampPx = a => (a / 10) * H * 0.37;

/* Bølgefunktioner — sin(2π f (x/W - t)) for højre-gående, modsat for venstre-gående */
const y1 = x => ampPx(A1) * Math.sin(2 * Math.PI * F1 * (x / W - t));
const y2 = x => ampPx(A2) * Math.sin(2 * Math.PI * F2 * ((W - x) / W - t));
const yr = x => y1(x) + y2(x);

/* ═══════════════════════════════════════════════════
   TEGNE-RUTINER
═══════════════════════════════════════════════════ */
function drawGrid() {
  ctx.save();
  ctx.strokeStyle = COL.grid;
  ctx.lineWidth = 1;
  for (let x=0; x<=W; x+=W/16) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<=H; y+=H/8)  { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle = COL.axis;
  ctx.setLineDash([4,6]);
  ctx.beginPath(); ctx.moveTo(0,CY); ctx.lineTo(W,CY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawWave(fn, x0, x1, color, lw, alpha, glowBlur) {
  if (x1 - x0 < 1) return;
  const isDark = !document.body.classList.contains('light');
  const ix0 = Math.max(0, Math.floor(x0));
  const ix1 = Math.min(W, Math.ceil(x1));
  ctx.save();
  ctx.beginPath(); ctx.rect(ix0, 0, ix1-ix0, H); ctx.clip();

  const path = () => {
    ctx.beginPath();
    for (let x = ix0; x <= ix1; x++) {
      const py = CY - fn(x);
      x === ix0 ? ctx.moveTo(x, py) : ctx.lineTo(x, py);
    }
  };

  if (glowBlur && isDark) {
    ctx.filter = `blur(${glowBlur}px)`;
    ctx.globalAlpha = alpha * 0.4;
    ctx.strokeStyle = color;
    ctx.lineWidth = lw * 2.5;
    ctx.lineJoin = 'round';
    path(); ctx.stroke();
    ctx.filter = 'none';
  }
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = isDark ? lw : lw + 0.4;   // tykkere linjer i lyst tema
  ctx.lineJoin = 'round';
  path(); ctx.stroke();
  ctx.restore();
}

function drawFront(x, color) {
  if (x < 2 || x > W-2) return;
  ctx.save();
  ctx.strokeStyle = color; ctx.globalAlpha = 0.28; ctx.lineWidth = 1;
  ctx.setLineDash([3,6]);
  ctx.beginPath(); ctx.moveTo(x,6); ctx.lineTo(x,H-6); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawEnvelope(x0, x1) {
  if (F1 !== F2) return;
  const isDark = !document.body.classList.contains('light');
  const ix0 = Math.max(0, Math.floor(x0)), ix1 = Math.min(W, Math.ceil(x1));
  const a = ampPx(A1) + ampPx(A2);
  ctx.save();
  ctx.beginPath(); ctx.rect(ix0, 0, ix1-ix0, H); ctx.clip();
  ctx.strokeStyle = isDark ? 'rgba(168,255,62,0.14)' : 'rgba(29,158,117,0.30)';
  ctx.lineWidth = 1; ctx.setLineDash([2,7]);
  [1,-1].forEach(s => {
    ctx.beginPath();
    for (let x = ix0; x <= ix1; x++) {
      const py = CY - s * a * Math.abs(Math.cos(Math.PI*F1*(2*x/W - 1)));
      x === ix0 ? ctx.moveTo(x,py) : ctx.lineTo(x,py);
    }
    ctx.stroke();
  });
  ctx.setLineDash([]);
  ctx.restore();
}

function drawMarkings(x0, x1) {
  if (F1 !== F2) return;
  const λ = W / F1;
  const envA = ampPx(A1) + ampPx(A2);
  const R = Math.ceil(2*W/λ) + 2;
  for (let n=-R; n<=R; n++) {
    const x = W/2 + n*λ/2;
    if (x >= x0-2 && x <= x1+2 && x >= 0 && x <= W) drawAntinode(x, envA);
  }
  for (let n=-R; n<=R; n++) {
    const x = W/2 + λ/4 + n*λ/2;
    if (x >= x0-2 && x <= x1+2 && x >= 0 && x <= W) drawDiamond(x);
  }
}

function drawDiamond(x) {
  const isDark = !document.body.classList.contains('light');
  const s = 5;
  ctx.save();
  ctx.fillStyle = COL.node;
  if (isDark) { ctx.shadowColor = COL.node; ctx.shadowBlur = 14; }
  ctx.beginPath();
  ctx.moveTo(x, CY-s); ctx.lineTo(x+s, CY); ctx.lineTo(x, CY+s); ctx.lineTo(x-s, CY);
  ctx.closePath(); ctx.fill();
  if (!isDark) {
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1; ctx.stroke();
  }
  ctx.restore();
}

function drawAntinode(x, envA) {
  const isDark = !document.body.classList.contains('light');
  [CY - envA, CY + envA].forEach(py => {
    ctx.save();
    ctx.fillStyle = COL.anti;
    if (isDark) { ctx.shadowColor = COL.anti; ctx.shadowBlur = 18; }
    ctx.beginPath(); ctx.arc(x, py, 4.5, 0, Math.PI*2); ctx.fill();
    if (!isDark) {
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 1; ctx.stroke();
    }
    ctx.restore();
  });
}

/* ═══════════════════════════════════════════════════
   PHASE BADGE
═══════════════════════════════════════════════════ */
const badge = document.getElementById('phaseBadge');
function updateBadge() {
  const over = front1 > front2;
  const full = front1 >= W-2 && front2 <= 2;
  if (!over) {
    badge.textContent = 'BØLGERNE NÆRMER SIG ▶◀';
    badge.style.color = 'var(--text-dim)';
  } else if (!full) {
    badge.textContent = F1===F2 ? 'INTERFERENS — STÅENDE BØLGE OPSTÅR' : 'BEAT-MØNSTER (f₁ ≠ f₂)';
    badge.style.color = F1===F2 ? 'var(--result)' : 'var(--wave2)';
  } else {
    badge.textContent = F1===F2 ? 'STÅENDE BØLGE' : 'BEAT-MØNSTER (f₁ ≠ f₂)';
    badge.style.color = F1===F2 ? 'var(--accent)' : 'var(--wave2)';
  }
}

/* ═══════════════════════════════════════════════════
   MAIN DRAW
═══════════════════════════════════════════════════ */
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawGrid();

  const over = front1 > front2;

  if (!over) {
    drawWave(y1,      0, front1, COL.wave1, 1.6, 0.92, 4);
    drawWave(y2, front2,      W, COL.wave2, 1.6, 0.92, 4);
    drawFront(front1, COL.wave1);
    drawFront(front2, COL.wave2);
  } else {
    drawWave(y1,      0, front2, COL.wave1, 1.5, 0.88, 3.5);
    drawWave(y2, front1,      W, COL.wave2, 1.5, 0.88, 3.5);

    if (showIndividual) {
      drawWave(y1, front2, front1, COL.wave1, 1.1, 0.40, 0);
      drawWave(y2, front2, front1, COL.wave2, 1.1, 0.40, 0);
    }

    drawEnvelope(front2, front1);
    drawMarkings(front2, front1);
    drawWave(yr, front2, front1, COL.result, 2.5, 1.0, 5.5);
  }
}

/* ═══════════════════════════════════════════════════
   ANIMATION LOOP
═══════════════════════════════════════════════════ */
function loop(ts) {
  if (lastTs === null) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  if (playing) {
    t      += dt * SPEED * RATE;
    front1  = Math.min(front1 + dt * SPEED * RATE * W, W);
    front2  = Math.max(front2 - dt * SPEED * RATE * W, 0);
  }

  draw();
  updateBadge();
  requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════════════ */
function wireInt(id, dispId, setter) {
  const el = document.getElementById(id);
  const vl = document.getElementById(dispId);
  el.addEventListener('input', () => {
    setter(+el.value);
    vl.textContent = el.value;
    updateBadge();
  });
}
wireInt('a1','a1v', v => A1=v);
wireInt('a2','a2v', v => A2=v);
wireInt('f1','f1v', v => F1=v);
wireInt('f2','f2v', v => F2=v);

document.getElementById('sp').addEventListener('input', e => {
  SPEED = +e.target.value;
  document.getElementById('spv').textContent = fmtDk(SPEED, 1);
});

document.getElementById('showInd').addEventListener('change', e => {
  showIndividual = e.target.checked;
});

document.getElementById('playBtn').addEventListener('click', () => {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  btn.textContent = playing ? '⏸ Pause' : '▶ Afspil';
  lastTs = null;
});

document.getElementById('resetBtn').addEventListener('click', () => {
  A1=DEF.A1; A2=DEF.A2; F1=DEF.F1; F2=DEF.F2; SPEED=DEF.SPEED;
  t = 0; lastTs = null;
  initFronts();

  [['a1',A1],['a2',A2],['f1',F1],['f2',F2]].forEach(([id,v]) => {
    document.getElementById(id).value = v;
    document.getElementById(id+'v').textContent = v;
  });
  document.getElementById('sp').value = SPEED;
  document.getElementById('spv').textContent = fmtDk(SPEED, 1);
  document.getElementById('showInd').checked = false;
  showIndividual = false;

  playing = false;
  document.getElementById('playBtn').textContent = '▶ Afspil';
  updateBadge();
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const src = document.documentElement.outerHTML;
  navigator.clipboard.writeText(src).then(() => {
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ Kopieret!';
    setTimeout(() => { btn.textContent = orig; }, 1800);
  });
});

updateBadge();
requestAnimationFrame(loop);
</script>
</body>
