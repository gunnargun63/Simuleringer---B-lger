<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Svingende streng</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c14; --panel:#0f1320; --border:#1e2a3a; --canvas-bg:#06080f;
  --accent:#00e5ff; --text:#c8d8e8; --dim:#8ab4cf; --muted:#4a6278;
  --glow:0 0 10px rgba(0,229,255,0.45);
  --readout-c:#a8ff3e; --readout-glow:0 0 8px rgba(168,255,62,.5);
  --h1c:#00e5ff;--h2c:#7df9ff;--h3c:#a8ff3e;--h4c:#ffd93d;--h5c:#ff6b35;--h6c:#d45eff;
  --string-rgb:0,229,255;
  --node-fill:#1e2a3a;
}
[data-theme="light"]{
  --bg:#e8e0d2; --panel:#f4eee3; --border:#d6cbb8; --canvas-bg:#fdfaf4;
  --accent:#2767a8; --text:#1a1a1a; --dim:#2a4060; --muted:#6a5b40;
  --glow:none;
  --readout-c:#1D9E75; --readout-glow:none;
  --h1c:#1a5099;--h2c:#378ADD;--h3c:#1D9E75;--h4c:#9c5e00;--h5c:#c0306a;--h6c:#7a2da8;
  --string-rgb:26,80,153;
  --node-fill:#f4eee3;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;font-weight:300;display:flex;flex-direction:column;}
[data-theme="light"] body{font-weight:400;}

header{flex:0 0 auto;padding:10px 18px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--panel);}
.wave-icon{width:19px;height:19px;color:var(--accent);display:inline-flex;flex-shrink:0;animation:wave-osc 1.8s ease-in-out infinite;transform-origin:center;opacity:.78;filter:drop-shadow(0 0 2px var(--accent));}
[data-theme="light"] .wave-icon{filter:none;}
.wave-icon svg{display:block;width:100%;height:100%;}
@keyframes wave-osc{0%,100%{transform:scaleY(1);}50%{transform:scaleY(-1);}}
header h1{font-family:'Orbitron','Share Tech Mono',monospace;font-weight:700;font-size:clamp(.78rem,1.9vw,1.0rem);color:var(--accent);text-shadow:var(--glow);letter-spacing:.20em;text-transform:uppercase;}
[data-theme="light"] header h1{text-shadow:none;}
header .subtitle{font-size:.72rem;color:var(--dim);font-family:'Share Tech Mono',monospace;letter-spacing:.06em;}
[data-theme="light"] header .subtitle{font-weight:700;}
.theme-btn{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.08em;padding:6px 14px;border-radius:3px;cursor:pointer;text-transform:uppercase;transition:all .15s;}
.theme-btn:hover{border-color:var(--accent);color:var(--accent);}
[data-theme="light"] .theme-btn{font-weight:700;}

.main{flex:1 1 0;display:grid;grid-template-columns:1fr 340px;min-height:0;gap:1px;background:var(--border);}

.left-col{display:flex;flex-direction:column;background:var(--bg);gap:1px;min-height:0;}

.canvas-wrap{flex:1 1 0;min-height:0;max-height:42vh;position:relative;background:var(--canvas-bg);display:flex;align-items:stretch;}
canvas{display:block;width:100%;height:100%;}
.string-label{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--dim);letter-spacing:.1em;pointer-events:none;}
[data-theme="light"] .string-label{font-weight:700;}

.harmonics-bar{flex:0 0 auto;background:var(--panel);padding:10px 14px 8px;border-top:1px solid var(--border);}
.panel-title{font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}
[data-theme="light"] .panel-title{font-weight:700;color:#1a3a5c;}

.harmonics-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.harmonic-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.harmonic-label{font-family:'Share Tech Mono',monospace;font-size:.82rem;font-weight:700;}
.harmonic-freq{font-family:'Share Tech Mono',monospace;font-size:.66rem;color:var(--dim);}
[data-theme="light"] .harmonic-freq{font-weight:700;}
.amplitude-val{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--dim);}
[data-theme="light"] .amplitude-val{font-weight:700;}

.v-slider-wrap{height:68px;display:flex;align-items:center;justify-content:center;}
input[type=range].vertical{writing-mode:vertical-lr;direction:rtl;-webkit-appearance:slider-vertical;appearance:slider-vertical;width:28px;height:68px;cursor:pointer;background:transparent;outline:none;}
input[type=range].vertical::-webkit-slider-runnable-track{width:4px;border-radius:2px;background:var(--border);}
input[type=range].vertical::-moz-range-track{width:4px;border-radius:2px;background:var(--border);}
input[type=range].vertical::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;border:2px solid var(--bg);cursor:pointer;}
input[type=range].vertical::-moz-range-thumb{width:22px;height:22px;border-radius:50%;border:2px solid var(--bg);cursor:pointer;}
.h1c input::-webkit-slider-thumb,.h1c input::-moz-range-thumb{background:var(--h1c);box-shadow:0 0 7px var(--h1c);} .h1c .harmonic-label{color:var(--h1c);}
.h2c input::-webkit-slider-thumb,.h2c input::-moz-range-thumb{background:var(--h2c);box-shadow:0 0 7px var(--h2c);} .h2c .harmonic-label{color:var(--h2c);}
.h3c input::-webkit-slider-thumb,.h3c input::-moz-range-thumb{background:var(--h3c);box-shadow:0 0 7px var(--h3c);} .h3c .harmonic-label{color:var(--h3c);}
.h4c input::-webkit-slider-thumb,.h4c input::-moz-range-thumb{background:var(--h4c);box-shadow:0 0 7px var(--h4c);} .h4c .harmonic-label{color:var(--h4c);}
.h5c input::-webkit-slider-thumb,.h5c input::-moz-range-thumb{background:var(--h5c);box-shadow:0 0 7px var(--h5c);} .h5c .harmonic-label{color:var(--h5c);}
.h6c input::-webkit-slider-thumb,.h6c input::-moz-range-thumb{background:var(--h6c);box-shadow:0 0 7px var(--h6c);} .h6c .harmonic-label{color:var(--h6c);}
[data-theme="light"] input[type=range].vertical::-webkit-slider-thumb,
[data-theme="light"] input[type=range].vertical::-moz-range-thumb{box-shadow:none;}

.presets-bar{flex:0 0 auto;display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:7px 14px 9px;background:var(--panel);border-top:1px solid var(--border);}
.preset-btn{background:transparent;border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.72rem;padding:6px 12px;border-radius:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;}
[data-theme="light"] .preset-btn{font-weight:700;}
.preset-btn:hover,.preset-btn:active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.07);}
[data-theme="light"] .preset-btn:hover,[data-theme="light"] .preset-btn:active{background:rgba(39,103,168,.08);}
.action-btns{margin-left:auto;display:flex;gap:8px;flex-shrink:0;}
.action-btn{background:transparent;border:1px solid var(--border);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.72rem;padding:7px 16px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:7px;letter-spacing:.07em;-webkit-tap-highlight-color:transparent;transition:all .15s;}
[data-theme="light"] .action-btn{font-weight:700;}
.action-btn:hover,.action-btn:active{background:rgba(0,229,255,.08);border-color:var(--accent);}
[data-theme="light"] .action-btn:hover,[data-theme="light"] .action-btn:active{background:rgba(39,103,168,.08);}
.action-icon{font-size:.9rem;line-height:1;}

.right-col{background:var(--panel);display:flex;flex-direction:column;overflow-y:auto;padding:13px 15px;gap:12px;}
.h-slider-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.h-slider-row label{font-size:.82rem;color:var(--text);min-width:96px;flex-shrink:0;}
[data-theme="light"] .h-slider-row label{font-weight:700;}
input[type=range].horiz{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none;cursor:pointer;}
input[type=range].horiz::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:var(--glow);cursor:pointer;}
input[type=range].horiz::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer;}
.slider-val{font-family:'Share Tech Mono',monospace;font-size:.82rem;color:var(--accent);min-width:78px;text-align:right;font-weight:700;}

.toggle-row{display:flex;align-items:center;gap:9px;margin-bottom:8px;font-size:.82rem;}
[data-theme="light"] .toggle-row{font-weight:700;}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:.2s;}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:.2s;}
.toggle input:checked+.toggle-slider{background:rgba(0,229,255,.2);}
[data-theme="light"] .toggle input:checked+.toggle-slider{background:rgba(39,103,168,.2);}
.toggle input:checked+.toggle-slider:before{transform:translateX(16px);background:var(--accent);box-shadow:var(--glow);}

.readouts{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.readout{background:var(--canvas-bg);border:1px solid var(--border);border-radius:4px;padding:8px 10px;}
.readout-label{font-size:.64rem;color:var(--dim);letter-spacing:.06em;margin-bottom:2px;}
[data-theme="light"] .readout-label{font-weight:700;color:#1a3a5c;}
.readout-value{font-family:'Courier New',monospace;font-size:1.15rem;color:var(--readout-c);text-shadow:var(--readout-glow);font-weight:700;}
.readout-unit{font-size:.64rem;color:var(--dim);}
[data-theme="light"] .readout-unit{font-weight:700;}
.divider{height:1px;background:var(--border);}
#freqList{font-family:'Courier New',monospace;font-size:.78rem;line-height:2;color:var(--dim);font-weight:700;}

@media(max-width:700px){
  html,body{overflow:auto;}
  .main{grid-template-columns:1fr;}
  .canvas-wrap{height:40vw;flex:none;}
  .right-col{max-height:none;}
  .theme-btn{padding:5px 10px;}
}
</style>
</head>
<body>

<header>
  <span class="wave-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M 1.5 12 Q 6.75 1 12 12 T 22.5 12" fill="none" stroke="currentColor" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </span>
  <h1>Svingende streng</h1>
  <span class="subtitle">St&#229;ende b&#248;lger &middot; Partialtonesimulering</span>
  <button class="theme-btn" id="themeBtn">Lys tema</button>
</header>

<div class="main">
  <div class="left-col">
    <div class="canvas-wrap">
      <canvas id="c"></canvas>
      <div class="string-label">&#8592; L &#8594;</div>
    </div>

    <div class="harmonics-bar">
      <div class="panel-title">Partialtoner &#8212; Amplitude</div>
      <div class="harmonics-grid" id="hGrid"></div>
    </div>

    <div class="presets-bar" id="presetsBar">
      <div class="action-btns">
        <button class="action-btn" id="pauseBtn"><span class="action-icon">&#9646;&#9646;</span> PAUSE</button>
        <button class="action-btn" id="copyBtn"><span class="action-icon">&#10697;</span> KOPIER KODE</button>
      </div>
    </div>
  </div>

  <div class="right-col">
    <div>
      <div class="panel-title">B&#248;lgeparametre</div>
      <div class="h-slider-row">
        <label>B&#248;lgehastighed</label>
        <input type="range" class="horiz" id="speedSlider" min="10" max="600" value="120" step="1">
        <span class="slider-val" id="speedVal">120 m/s</span>
      </div>
      <div class="h-slider-row">
        <label>Strengl&#230;ngde L</label>
        <input type="range" class="horiz" id="lengthSlider" min="0.5" max="1.0" value="0.75" step="0.01">
        <span class="slider-val" id="lengthVal">0,75 m</span>
      </div>
      <div class="h-slider-row" style="margin-bottom:0;">
        <label>Tidsskala</label>
        <input type="range" class="horiz" id="tsSlider" min="-3" max="-1.7" value="-2.477" step="0.01">
        <span class="slider-val" id="tsVal">1/300</span>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="toggle-row">
        <label class="toggle"><input type="checkbox" id="dampToggle"><span class="toggle-slider"></span></label>
        <span>D&#230;mpning</span>
      </div>
      <div class="h-slider-row" id="dampRow" style="opacity:.3;pointer-events:none;margin-bottom:6px;">
        <label>D&#230;mpning &#947;</label>
        <input type="range" class="horiz" id="dampSlider" min="0.5" max="50" value="5" step="0.5">
        <span class="slider-val" id="dampVal">5,0 /s</span>
      </div>
      <div class="toggle-row" style="margin-bottom:0;">
        <label class="toggle"><input type="checkbox" id="showPartialsToggle" checked><span class="toggle-slider"></span></label>
        <span>Vis partialtoner separat</span>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="panel-title" style="margin-bottom:8px;">Afl&#230;sninger</div>
      <div class="readouts">
        <div class="readout">
          <div class="readout-label">Grundfrekvens f&#8321;</div>
          <div class="readout-value" id="f1Display">80,0</div>
          <div class="readout-unit">Hz</div>
        </div>
        <div class="readout">
          <div class="readout-label">B&#248;lgel&#230;ngde &#955;&#8321;</div>
          <div class="readout-value" id="lambdaDisplay">1,50</div>
          <div class="readout-unit">m</div>
        </div>
        <div class="readout">
          <div class="readout-label">Aktive partialtoner</div>
          <div class="readout-value" id="activeDisplay">1</div>
          <div class="readout-unit">stk</div>
        </div>
        <div class="readout">
          <div class="readout-label">Periode T&#8321;</div>
          <div class="readout-value" id="periodDisplay">12,5</div>
          <div class="readout-unit">ms</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="panel-title" style="margin-bottom:5px;">Aktive frekvenser</div>
      <div id="freqList"></div>
    </div>
  </div>
</div>

<script>
var N = 6;
var COLORS_DARK  = ['#00e5ff','#7df9ff','#a8ff3e','#ffd93d','#ff6b35','#d45eff'];
var COLORS_LIGHT = ['#1a5099','#378ADD','#1D9E75','#9c5e00','#c0306a','#7a2da8'];
var NPTS = 500;
var amps = [1,0,0,0,0,0];
var speed = 120, L = 0.75;
var timeScale = 1/300;
var damping = false, gamma = 5.0, showParts = true, paused = false;
var physT = 0, lastStamp = null;
var freqLabels = [], ampValEls = [];
var isDark = true;

function COLORS(){ return isDark ? COLORS_DARK : COLORS_LIGHT; }
function D(d, l){ return isDark ? d : l; }
function fmtDk(x, dec){ return x.toFixed(dec).replace('.', ','); }

var gridEl = document.getElementById('hGrid');
for (var i = 0; i < N; i++){
  (function(idx){
    var col = document.createElement('div');
    col.className = 'harmonic-col h' + (idx+1) + 'c';
    var lbl = document.createElement('div');
    lbl.className = 'harmonic-label';
    lbl.textContent = 'n=' + (idx+1);
    var fLbl = document.createElement('div');
    fLbl.className = 'harmonic-freq';
    fLbl.textContent = '--';
    freqLabels.push(fLbl);
    var wrap = document.createElement('div');
    wrap.className = 'v-slider-wrap';
    var inp = document.createElement('input');
    inp.type = 'range';
    inp.className = 'vertical';
    inp.min = 0; inp.max = 1; inp.step = 0.01;
    inp.value = amps[idx];
    var aVal = document.createElement('div');
    aVal.className = 'amplitude-val';
    aVal.textContent = fmtDk(amps[idx], 2);
    ampValEls.push(aVal);
    inp.addEventListener('input', function(){
      amps[idx] = parseFloat(this.value);
      aVal.textContent = fmtDk(amps[idx], 2);
      updateReadouts();
    });
    wrap.appendChild(inp);
    col.appendChild(lbl);
    col.appendChild(fLbl);
    col.appendChild(wrap);
    col.appendChild(aVal);
    gridEl.appendChild(col);
  })(i);
}

var PRESETS = [
  {label:'Grundtone',  a:[1,0,0,0,0,0]},
  {label:'2. partial', a:[0,1,0,0,0,0]},
  {label:'3. partial', a:[0,0,1,0,0,0]},
  {label:'4. partial', a:[0,0,0,1,0,0]},
  {label:'5. partial', a:[0,0,0,0,1,0]},
  {label:'6. partial', a:[0,0,0,0,0,1]},
  {label:'Tilfaeldig', a:null},
  {label:'Nulstil',    a:[0,0,0,0,0,0]}
];
var presetsBar = document.getElementById('presetsBar');
var pauseBtn = document.getElementById('pauseBtn');
PRESETS.forEach(function(p){
  var btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.textContent = p.label;
  btn.addEventListener('click', function(){
    var raw = p.a ? p.a.slice() : [Math.random(),Math.random(),Math.random(),Math.random(),Math.random(),Math.random()];
    var mx = 0;
    for (var i = 0; i < N; i++) if (raw[i] > mx) mx = raw[i];
    if (mx < 1e-6) mx = 1;
    var inputs = gridEl.querySelectorAll('input[type=range]');
    for (var i = 0; i < N; i++){
      amps[i] = raw[i]/mx;
      inputs[i].value = amps[i];
      ampValEls[i].textContent = fmtDk(amps[i], 2);
    }
    updateReadouts();
  });
  presetsBar.insertBefore(btn, presetsBar.querySelector('.action-btns'));
});

function bindH(id, valId, cb){
  var el = document.getElementById(id), vl = document.getElementById(valId);
  el.addEventListener('input', function(){ cb(parseFloat(el.value), vl); });
}
bindH('speedSlider','speedVal', function(v, vl){
  speed = v;
  vl.textContent = v + ' m/s';
  updateReadouts();
});
bindH('lengthSlider','lengthVal', function(v, vl){
  L = v;
  vl.textContent = fmtDk(v, 2) + ' m';
  updateReadouts();
});
bindH('tsSlider','tsVal', function(v, vl){
  timeScale = Math.pow(10, v);
  var inv = Math.round(1/timeScale);
  vl.textContent = '1/' + inv;
});
bindH('dampSlider','dampVal', function(v, vl){
  gamma = v;
  vl.textContent = fmtDk(v, 1) + ' /s';
});

document.getElementById('dampToggle').addEventListener('change', function(){
  damping = this.checked;
  var r = document.getElementById('dampRow');
  r.style.opacity = damping ? '1' : '0.3';
  r.style.pointerEvents = damping ? 'auto' : 'none';
  if (damping) physT = 0;
});
document.getElementById('showPartialsToggle').addEventListener('change', function(){
  showParts = this.checked;
});
pauseBtn.addEventListener('click', function(){
  paused = !paused;
  this.innerHTML = paused
    ? '<span class="action-icon">&#9654;</span> AFSPIL'
    : '<span class="action-icon">&#9646;&#9646;</span> PAUSE';
  if (!paused) lastStamp = null;
});
document.getElementById('copyBtn').addEventListener('click', function(){
  var html = document.documentElement.outerHTML;
  navigator.clipboard.writeText(html).then(function(){
    var btn = document.getElementById('copyBtn');
    btn.innerHTML = '<span class="action-icon">&#10003;</span> KOPIERET!';
    setTimeout(function(){
      btn.innerHTML = '<span class="action-icon">&#10697;</span> KOPIER KODE';
    }, 2000);
  });
});

document.getElementById('themeBtn').addEventListener('click', function(){
  isDark = !isDark;
  if (isDark){
    document.documentElement.removeAttribute('data-theme');
    this.textContent = 'Lys tema';
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    this.textContent = 'Moerkt tema';
  }
  updateReadouts();
});

function updateReadouts(){
  var f1 = speed/(2*L);
  document.getElementById('f1Display').textContent = fmtDk(f1, 1);
  document.getElementById('lambdaDisplay').textContent = fmtDk(2*L, 2);
  var cnt = 0;
  for (var i = 0; i < N; i++) if (amps[i] > 0.005) cnt++;
  document.getElementById('activeDisplay').textContent = cnt;
  document.getElementById('periodDisplay').textContent = fmtDk(1000/f1, 1);
  var cols = COLORS();
  var html = '';
  for (var i = 0; i < N; i++){
    var fn = f1*(i+1);
    freqLabels[i].textContent = fmtDk(fn, 1) + ' Hz';
    if (amps[i] > 0.005){
      html += '<span style="color:' + cols[i] + '">n=' + (i+1) + '</span>&nbsp;&nbsp;'
            + fmtDk(fn, 1) + ' Hz&nbsp;&nbsp;A=' + fmtDk(amps[i], 2) + '<br>';
    }
  }
  document.getElementById('freqList').innerHTML = html || '<span style="color:' + D('#2a3a4a','#999') + '">Ingen aktive partialtoner</span>';
}

var canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
var cW = 0, cH = 0;
function resize(){
  var dpr = window.devicePixelRatio || 1, wrap = canvas.parentElement;
  var W = wrap.clientWidth, H = wrap.clientHeight;
  if (W < 1 || H < 1) return;
  cW = W; cH = H;
  canvas.width = W*dpr;
  canvas.height = H*dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// y(frac, t_phys) — physical-time argument; w1 = 2*pi*f1 in 1/s
function getY(frac, t){
  var f1 = speed/(2*L);
  var w1 = 2*Math.PI*f1;
  var dmp = damping ? Math.exp(-gamma*t) : 1;
  var y = 0;
  for (var n = 1; n <= N; n++){
    if (amps[n-1] < 0.001) continue;
    y += amps[n-1] * Math.sin(n*Math.PI*frac) * Math.cos(n*w1*t);
  }
  return y*dmp;
}

function draw(stamp){
  if (!lastStamp) lastStamp = stamp;
  var dtReal = Math.min((stamp - lastStamp)/1000, 0.05);
  lastStamp = stamp;
  if (!paused) physT += dtReal * timeScale;

  if (cW < 1 || cH < 1){ requestAnimationFrame(draw); return; }
  var W = cW, H = cH, cy = H/2;
  var pad = W*0.05;
  var maxStrW = W - 2*pad;
  // L = 0.5 m -> strW = 0.5 * maxStrW; L = 1.0 m -> strW = maxStrW.
  // Visual width is proportional to L (canvas is calibrated so 1.0 m = max width).
  var strW = maxStrW * L;
  var x0 = (W - strW)/2;

  // Background
  ctx.fillStyle = D('#06080f', '#fdfaf4');
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = D('rgba(30,42,58,0.55)', 'rgba(120,100,70,0.18)');
  ctx.lineWidth = 0.5;
  for (var gi = 1; gi < 8; gi++){
    ctx.beginPath();
    ctx.moveTo(0, H*gi/8);
    ctx.lineTo(W, H*gi/8);
    ctx.stroke();
  }
  for (var gj = 1; gj < 12; gj++){
    ctx.beginPath();
    ctx.moveTo(W*gj/12, 0);
    ctx.lineTo(W*gj/12, H);
    ctx.stroke();
  }

  // Center axis line (along string)
  ctx.strokeStyle = D('rgba(74,98,120,0.4)', 'rgba(80,60,40,0.45)');
  ctx.lineWidth = 1;
  ctx.setLineDash([4,7]);
  ctx.beginPath();
  ctx.moveTo(x0, cy);
  ctx.lineTo(x0+strW, cy);
  ctx.stroke();
  ctx.setLineDash([]);

  // Amplitude scaling so wave never leaves canvas
  var ampSum = 0;
  for (var i = 0; i < N; i++) if (amps[i] > 0.001) ampSum += amps[i];
  if (ampSum < 0.001) ampSum = 1;
  var maxA = (H*0.44)/ampSum;

  var f1 = speed/(2*L);
  var w1 = 2*Math.PI*f1;
  var dmp = damping ? Math.exp(-gamma*physT) : 1;
  var cols = COLORS();

  // Individual partial waves (faded)
  if (showParts){
    for (var n = 1; n <= N; n++){
      if (amps[n-1] < 0.005) continue;
      ctx.beginPath();
      ctx.strokeStyle = cols[n-1] + (isDark ? '55' : 'aa');
      ctx.lineWidth = 1;
      for (var j = 0; j <= NPTS; j++){
        var f = j/NPTS;
        var xp = x0 + f*strW;
        var yp = cy - amps[n-1]*maxA*Math.sin(n*Math.PI*f)*Math.cos(n*w1*physT)*dmp;
        if (j === 0) ctx.moveTo(xp, yp); else ctx.lineTo(xp, yp);
      }
      ctx.stroke();
    }
  }

  // Sum wave (the visible string)
  var hasAny = false;
  for (var i = 0; i < N; i++) if (amps[i] > 0.005){ hasAny = true; break; }
  if (hasAny){
    var pts = new Float32Array(NPTS+1);
    for (var j = 0; j <= NPTS; j++) pts[j] = getY(j/NPTS, physT);
    var sRGB = isDark ? '0,229,255' : '26,80,153';
    var passes = isDark ? [[10,0.06],[4,0.18],[1.5,1.0]] : [[1.8, 1.0]];
    for (var p = 0; p < passes.length; p++){
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(' + sRGB + ',' + passes[p][1] + ')';
      ctx.lineWidth = passes[p][0];
      for (var j = 0; j <= NPTS; j++){
        var xp = x0 + (j/NPTS)*strW;
        var yp = cy - pts[j]*maxA;
        if (j === 0) ctx.moveTo(xp, yp); else ctx.lineTo(xp, yp);
      }
      ctx.stroke();
    }
  } else {
    ctx.beginPath();
    ctx.strokeStyle = D('rgba(0,229,255,0.4)', 'rgba(26,80,153,0.8)');
    ctx.lineWidth = 1.5;
    ctx.moveTo(x0, cy);
    ctx.lineTo(x0+strW, cy);
    ctx.stroke();
  }

  // Endpoints + nodes per active partial
  for (var n = 1; n <= N; n++){
    if (amps[n-1] < 0.005) continue;
    for (var k = 0; k <= n; k++){
      var frac = k/n;
      var xp = x0 + frac*strW;
      var isEnd = (k === 0 || k === n);
      ctx.beginPath();
      ctx.arc(xp, cy, isEnd ? 6 : 3.5, 0, Math.PI*2);
      ctx.fillStyle = isEnd ? D('#1e2a3a','#f4eee3') : cols[n-1] + (isDark ? '90' : 'cc');
      ctx.fill();
      ctx.strokeStyle = isEnd ? D('#00e5ff','#1a5099') : cols[n-1];
      ctx.lineWidth = isEnd ? 2 : 1;
      ctx.stroke();
    }
  }

  requestAnimationFrame(draw);
}

updateReadouts();
requestAnimationFrame(draw);
</script>
</body>
</html>
