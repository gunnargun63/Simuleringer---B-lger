<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dobbeltspalteeksperiment</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07090f;
    color: #8fb8cc;
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px 16px 28px;
    gap: 14px;
  }
  header { text-align: center; }
  h1 {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: #daeeff;
    text-transform: uppercase;
  }
  .formula-top {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: #2a5570;
    margin-top: 5px;
    letter-spacing: 0.08em;
  }
  .canvas-wrap {
    border: 1px solid #0e1f30;
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,80,180,0.1), 0 0 0 1px #09131e;
    width: 100%;
    max-width: 940px;
  }
  canvas { display: block; width: 100%; height: auto; }

  /* ── toolbar rows ── */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 10px;
    align-items: center;
    justify-content: center;
  }
  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: #7ac8e0;
    background: #09101a;
    border: 1px solid #1a3a50;
    border-radius: 4px;
    padding: 7px 18px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }
  .btn:hover { background: #0e1e2e; border-color: #36b4d4; color: #b8eaf8; }
  .btn.active { background: #0a1e30; border-color: #36b4d4; color: #36b4d4; }
  .btn svg { flex-shrink: 0; }

  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 9px;
    background: #09101a;
    border: 1px solid #1a3a50;
    border-radius: 4px;
    padding: 7px 14px;
  }
  .speed-lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: #305565;
    white-space: nowrap;
  }
  .speed-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    color: #36b4d4;
    min-width: 3.2em;
    text-align: right;
  }
  input[type="range"].speed-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 120px;
    height: 3px;
    background: #0e2535;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"].speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: #36b4d4;
    border-radius: 50%;
    border: 2px solid #07090f;
    box-shadow: 0 0 6px rgba(54,180,212,0.5);
  }
  input[type="range"].speed-slider::-moz-range-thumb {
    width: 12px; height: 12px;
    background: #36b4d4;
    border-radius: 50%;
    border: 2px solid #07090f;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 20px 32px;
    align-items: center;
    justify-content: center;
    background: #09101a;
    border: 1px solid #0e1f30;
    border-radius: 4px;
    padding: 14px 30px;
  }
  .ctrl { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ctrl-lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: #305565;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .ctrl-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: #36b4d4;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 180px;
    height: 3px;
    background: #0e2535;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    touch-action: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    background: #36b4d4;
    border-radius: 50%;
    border: 2px solid #07090f;
    box-shadow: 0 0 7px rgba(54,180,212,0.5);
  }
  input[type="range"]::-moz-range-thumb {
    width: 13px; height: 13px;
    background: #36b4d4;
    border-radius: 50%;
    border: 2px solid #07090f;
  }
  .sep { width: 1px; height: 48px; background: #0e1f30; }
  .order-bar {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: #1e4a60;
    text-align: center;
    min-height: 1.4em;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <h1>Dobbeltspalteeksperiment</h1>
  <div class="formula-top">Konstruktiv interferens: d &middot; sin &theta;<sub style="font-size:0.75em">m</sub> = m &middot; &lambda; &nbsp;|&nbsp; Young's eksperiment (1801)</div>
</header>

<div class="canvas-wrap">
  <canvas id="c" width="940" height="530"></canvas>
</div>

<!-- Playback toolbar -->
<div class="toolbar">
  <button class="btn active" id="btnPlay">
    <!-- pause icon shown when playing -->
    <svg id="icoPlay" width="13" height="14" viewBox="0 0 13 14" fill="currentColor">
      <rect x="0" y="0" width="4" height="14" rx="1"/>
      <rect x="9" y="0" width="4" height="14" rx="1"/>
    </svg>
    <span id="lblPlay">PAUSE</span>
  </button>

  <button class="btn" id="btnReset">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11.5 2A6.5 6.5 0 1 0 12.5 6.5"/>
      <polyline points="9,0 12.5,2 10,5"/>
    </svg>
    NULSTIL
  </button>

  <button class="btn" id="btnCopy">
    <svg width="13" height="14" viewBox="0 0 13 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="4" width="8" height="9" rx="1.5"/>
      <path d="M2 10V2a1 1 0 0 1 1-1h7"/>
    </svg>
    <span id="lblCopy">KOPIER KODE</span>
  </button>

  <div class="speed-wrap">
    <span class="speed-lbl">HASTIGHED</span>
    <input type="range" class="speed-slider" id="sSpeed" min="1" max="10" value="4" step="1">
    <span class="speed-val" id="vSpeed">×1.0</span>
  </div>
</div>

<!-- Physics sliders -->
<div class="controls">
  <div class="ctrl">
    <div class="ctrl-lbl">B&oslash;lgel&aelig;ngde &lambda;</div>
    <input type="range" id="sLam" min="400" max="700" value="530" step="5">
    <div class="ctrl-val" id="vLam">&lambda; = 530 nm</div>
  </div>
  <div class="sep"></div>
  <div class="ctrl">
    <div class="ctrl-lbl">Gitterkonstant d</div>
    <input type="range" id="sD" min="800" max="3000" value="1500" step="25">
    <div class="ctrl-val" id="vD">d = 1500 nm</div>
  </div>
  <div class="sep"></div>
  <div class="ctrl">
    <div class="ctrl-lbl">Antal ordner (m<sub style="font-size:0.8em">max</sub>)</div>
    <div class="ctrl-val" id="nOrders" style="font-size:1.4rem;">&ndash;</div>
  </div>
</div>

<!-- order-bar removed -->
<div id="orderBar" style="display:none"></div>

<script>
/* ── roundRect polyfill for older Safari/iOS ────────────────────── */
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2*r) r = w/2;
    if (h < 2*r) r = h/2;
    this.moveTo(x+r, y);
    this.lineTo(x+w-r, y);
    this.quadraticCurveTo(x+w, y, x+w, y+r);
    this.lineTo(x+w, y+h-r);
    this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    this.lineTo(x+r, y+h);
    this.quadraticCurveTo(x, y+h, x, y+h-r);
    this.lineTo(x, y+r);
    this.quadraticCurveTo(x, y, x+r, y);
    this.closePath();
  };
}

const cvs = document.getElementById('c');
const ctx  = cvs.getContext('2d');
const W = cvs.width, H = cvs.height;
const WALL  = 268;
const SCR   = W - 58;
const SCR_W = 14;
const D     = SCR - WALL;
const CY    = H / 2;

// Physics scaling
const NM_TO_PX = 0.065;
let lam_nm = 530, d_nm = 1500;
let lam = lam_nm * NM_TO_PX;
let d   = d_nm   * NM_TO_PX;

// Speed: index 1-10 → actual multiplier
const SPEED_TABLE = [0.15, 0.3, 0.5, 0.75, 1.0, 1.5, 2.0, 3.0, 4.5, 6.0];
let speedIdx = 3; // default index 4 (0-based 3) → ×0.75… let's use index 4 → ×1.0
speedIdx = 4;
function getSpeed() { return SPEED_TABLE[speedIdx]; }

// Simulation state
let playing    = true;
let phaseTime  = 0;       // accumulated "virtual time" for wave phase
let waveHead   = 0;       // x-position of the leading wavefront (reset animation)
let settled    = false;   // true once waveHead has passed SCR and pattern is fully built
let dirty      = true;
let waveRGB    = [0, 220, 120];
let raf        = null;

/* ── Colour ────────────────────────────────────────────────────── */
function wavelengthToRGB(nm) {
  let r, g, b;
  if      (nm < 380) { r=0.5; g=0;   b=0.5; }
  else if (nm < 440) { r=(440-nm)/(440-380); g=0;   b=1; }
  else if (nm < 490) { r=0; g=(nm-440)/(490-440);   b=1; }
  else if (nm < 510) { r=0; g=1;   b=(510-nm)/(510-490); }
  else if (nm < 580) { r=(nm-510)/(580-510); g=1;   b=0; }
  else if (nm < 645) { r=1; g=(645-nm)/(645-580);   b=0; }
  else               { r=1; g=0;   b=0; }
  let f = (nm<420) ? 0.3+0.7*(nm-380)/(420-380)
        : (nm>680) ? 0.3+0.7*(780-nm)/(780-680) : 1;
  return [Math.round(255*r*f), Math.round(255*g*f), Math.round(255*b*f)];
}
function refreshColor() { waveRGB = wavelengthToRGB(lam_nm); }
refreshColor();

/* ── Offscreen intensity map ────────────────────────────────────── */
const off = document.createElement('canvas');
off.width = W; off.height = H;
const oCtx = off.getContext('2d');

function buildMap() {
  const img = oCtx.createImageData(W, H);
  const px  = img.data;
  const y1 = CY - d/2, y2 = CY + d/2;
  const [cr,cg,cb] = waveRGB;
  for (let row = 0; row < H; row++) {
    for (let col = WALL; col < SCR; col++) {
      const dx = col - WALL;
      const r1 = Math.hypot(dx, row-y1);
      const r2 = Math.hypot(dx, row-y2);
      const I  = (1 + Math.cos(2*Math.PI*(r1-r2)/lam)) * 0.5;
      const i  = (row*W + col)*4;
      px[i]   = Math.round(I*cr*0.65);
      px[i+1] = Math.round(I*cg*0.65);
      px[i+2] = Math.round(I*cb*0.65);
      px[i+3] = Math.round(28 + I*180);
    }
  }
  oCtx.clearRect(0, 0, W, H);
  oCtx.putImageData(img, 0, 0);
  dirty = false;
}

/* ── Maxima ─────────────────────────────────────────────────────── */
// All physically possible orders (|sinθ| < 1)
function getAllMaxima() {
  const out = [];
  for (let m = -20; m <= 20; m++) {
    const sinT = m * lam / d;
    if (Math.abs(sinT) >= 1.0) continue;
    const theta = Math.asin(sinT);
    const ys = CY + D * Math.tan(theta);
    const onScreen = (ys >= 4 && ys <= H - 4);
    out.push({ m, theta, ys, onScreen });
  }
  return out;
}
function getVisibleMaxima() { return getAllMaxima().filter(mv => mv.onScreen); }
function getMaxima() { return getVisibleMaxima(); } // legacy alias

/* ── Draw: background ───────────────────────────────────────────── */
function drawBG() {
  ctx.fillStyle = '#07090f';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(18,45,70,0.55)';
  for (let x=40; x<W; x+=40)
    for (let y=40; y<H; y+=40)
      ctx.fillRect(x-0.5, y-0.5, 1, 1);
}

/* ── Draw: plane wave (lines, clipped to waveHead) ──────────────── */
function drawPlaneWave() {
  ctx.fillStyle = '#060a10';
  ctx.fillRect(0, 0, WALL, H);

  const [cr,cg,cb] = waveRGB;
  const clipX = Math.min(waveHead, WALL);  // plane wave never crosses wall
  const phase  = phaseTime % lam;

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, clipX, H);
  ctx.clip();

  for (let x = phase % lam; x < WALL; x += lam) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.85)`;
    ctx.lineWidth = 1.2;
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.12)`;
    ctx.lineWidth = 6;
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.stroke();
  }
  ctx.restore();

  // Leading wavefront highlight when not yet settled
  if (!settled && waveHead < WALL) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.55)`;
    ctx.lineWidth = 2;
    ctx.moveTo(waveHead, 0); ctx.lineTo(waveHead, H);
    ctx.stroke();
    // glow
    ctx.beginPath();
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.18)`;
    ctx.lineWidth = 12;
    ctx.moveTo(waveHead, 0); ctx.lineTo(waveHead, H);
    ctx.stroke();
  }

  // Arrow + label
  const ay = H-22;
  ctx.beginPath();
  ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.32)`;
  ctx.lineWidth = 1;
  ctx.moveTo(16, ay); ctx.lineTo(Math.min(waveHead, WALL)-16, ay);
  ctx.stroke();
  ctx.beginPath();
  ctx.fillStyle = `rgba(${cr},${cg},${cb},0.32)`;
  const ax = Math.min(waveHead, WALL)-13;
  ctx.moveTo(ax, ay); ctx.lineTo(ax-9, ay-4); ctx.lineTo(ax-9, ay+4);
  ctx.closePath(); ctx.fill();
  ctx.font = '10px "Share Tech Mono",monospace';
  ctx.fillStyle = `rgba(${cr},${cg},${cb},0.38)`;
  ctx.textAlign = 'center';
  ctx.fillText('PLAN B\u00d8LGE  \u2192', WALL/2, H-8);
}

/* ── Draw: wall ─────────────────────────────────────────────────── */
function drawWall() {
  const y1 = CY-d/2, y2 = CY+d/2;
  const SO=9, wx=WALL-10, ww=20;  // wider wall

  // Wall body — brighter, more solid
  ctx.fillStyle = '#1e3248';
  ctx.fillRect(wx, 0,       ww, y1-SO);
  ctx.fillRect(wx, y1+SO,   ww, y2-SO-(y1+SO));
  ctx.fillRect(wx, y2+SO,   ww, H-(y2+SO));

  // Bright edge highlight on right face of wall
  ctx.fillStyle = '#3a6080';
  ctx.fillRect(wx+ww-2, 0,       2, y1-SO);
  ctx.fillRect(wx+ww-2, y1+SO,   2, y2-SO-(y1+SO));
  ctx.fillRect(wx+ww-2, y2+SO,   2, H-(y2+SO));

  // Dark gap behind slits (makes slits look like real holes)
  ctx.fillStyle = '#07090f';
  ctx.fillRect(wx, y1-SO, ww, SO*2);
  ctx.fillRect(wx, y2-SO, ww, SO*2);

  // Outer border
  ctx.strokeStyle='#2a4a62'; ctx.lineWidth=1;
  ctx.strokeRect(wx, 0, ww, H);

  // d-bracket
  const bx=wx-20;
  ctx.strokeStyle='rgba(55,125,165,0.6)'; ctx.lineWidth=1;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(bx,y1); ctx.lineTo(bx,y2); ctx.stroke();
  ctx.setLineDash([]);
  [[bx,y1],[bx,y2]].forEach(([x,y])=>{
    ctx.beginPath(); ctx.moveTo(x-3,y); ctx.lineTo(x+3,y); ctx.stroke();
  });
  ctx.fillStyle='rgba(65,135,175,0.85)';
  ctx.font='bold 13px "Rajdhani",sans-serif';
  ctx.textAlign='right';
  ctx.fillText('d', bx-6, CY+5);
  ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillStyle='#286080';
  ctx.textAlign='right';
  ctx.fillText('S\u2081', wx-2, y1+4);
  ctx.fillText('S\u2082', wx-2, y2+4);
}

/* ── Draw: ring waves (only after wave reaches wall) ────────────── */
function drawRings() {
  if (waveHead < WALL) return;   // plane wave hasn't arrived yet

  const ringAge  = waveHead - WALL;   // how far rings have expanded
  const y1 = CY-d/2, y2 = CY+d/2;
  const maxR = Math.hypot(D, H) + lam*2;
  const phase = phaseTime % lam;
  const [cr,cg,cb] = waveRGB;

  ctx.save();
  // Clip strictly between wall and screen (SCR is the left edge of the screen bar)
  ctx.beginPath(); ctx.rect(WALL, 0, SCR - WALL, H); ctx.clip();

  [y1, y2].forEach(sy => {
    for (let k = 0; phase + k*lam < maxR; k++) {
      const r = phase + k*lam;
      if (r < 1) continue;
      if (r > ringAge) continue;          // don't draw rings beyond wavefront

      const fade = Math.max(0, 1 - r/maxR);
      ctx.beginPath();
      ctx.arc(WALL, sy, r, -Math.PI*0.53, Math.PI*0.53);
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${(fade*0.88).toFixed(3)})`;
      ctx.lineWidth = 1.4;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(WALL, sy, r, -Math.PI*0.53, Math.PI*0.53);
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${(fade*0.20).toFixed(3)})`;
      ctx.lineWidth = 6;
      ctx.stroke();
    }
  });
  ctx.restore();
}

/* ── Draw: screen ───────────────────────────────────────────────── */
function drawScreen() {
  // Fade in only after wave actually reaches the screen
  const fadeIn = Math.min(1, Math.max(0, waveHead - SCR) / (lam * 6));

  const y1 = CY-d/2, y2 = CY+d/2;
  const dx = SCR-WALL;
  const [cr,cg,cb]=waveRGB;
  ctx.fillStyle='#080c15';
  ctx.fillRect(SCR, 0, SCR_W, H);
  ctx.strokeStyle='#182a3e'; ctx.lineWidth=1;
  ctx.strokeRect(SCR, 0, SCR_W, H);

  for (let py=0; py<H; py++) {
    const r1=Math.hypot(dx, py-y1);
    const r2=Math.hypot(dx, py-y2);
    const I=(1+Math.cos(2*Math.PI*(r1-r2)/lam))*0.5*fadeIn;
    ctx.fillStyle=`rgb(${Math.round(cr*I*0.92)},${Math.round(cg*I*0.92)},${Math.round(cb*I*0.92)})`;
    ctx.fillRect(SCR+1, py, SCR_W-2, 1);
  }
  ctx.save();
  ctx.translate(SCR+SCR_W+12, CY);
  ctx.rotate(Math.PI/2);
  ctx.font='9px "Share Tech Mono",monospace';
  ctx.fillStyle='#28485e';
  ctx.textAlign='center';
  ctx.fillText('SK\u00c6RM', 0, 0);
  ctx.restore();
}

/* ── Draw: interference maxima (only after wave reaches screen) ─── */
function drawMaxima(allMaxima) {
  // Only begin fading in once the wave front has actually hit the screen
  const pastScreen = Math.max(0, waveHead - SCR);
  const fadeIn = Math.min(1, pastScreen / (lam * 6));
  if (fadeIn < 0.02) return;

  const [cr,cg,cb]=waveRGB;
  const dr=Math.min(255,cr+90), dg=Math.min(255,cg+90), db=Math.min(255,cb+90);

  // Central axis hint
  ctx.beginPath();
  ctx.setLineDash([6,5]);
  ctx.strokeStyle=`rgba(${dr},${dg},${db},${0.12*fadeIn})`;
  ctx.lineWidth=1;
  ctx.moveTo(WALL,CY); ctx.lineTo(SCR,CY);
  ctx.stroke(); ctx.setLineDash([]);

  allMaxima.forEach(({m, theta, ys, onScreen}) => {
    const isC=m===0, absM=Math.abs(m);
    const tDeg=Math.abs(theta*180/Math.PI).toFixed(1);

    // For off-screen orders, clamp ys to canvas edge for drawing the hint line endpoint
    const lineEndY = Math.max(2, Math.min(H-2, ys));
    const la=(isC?0.14:Math.max(0.05,0.12-absM*0.015))*fadeIn;

    // Direction hint line (clipped to canvas)
    ctx.beginPath();
    ctx.setLineDash([5,7]);
    ctx.strokeStyle=`rgba(${dr},${dg},${db},${la})`;
    ctx.lineWidth=isC?0.9:0.7;
    ctx.moveTo(WALL,CY); ctx.lineTo(onScreen ? SCR : WALL + D*(lineEndY-CY)/(ys-CY||0.001), lineEndY);
    ctx.stroke(); ctx.setLineDash([]);

    // Small angle arc at wall
    if (!isC) {
      const arcR=28+absM*6, a1=Math.atan2(ys-CY,D);
      ctx.beginPath();
      ctx.strokeStyle=`rgba(${dr},${dg},${db},${0.12*fadeIn})`;
      ctx.lineWidth=1;
      ctx.arc(WALL,CY,arcR,Math.min(0,a1),Math.max(0,a1));
      ctx.stroke();
    }

    // ── Angle label along the direction line ─────────────────
    const lblText = isC ? '\u03b8\u2080 = 0\u00b0' : `\u03b8${absM} = ${tDeg}\u00b0`;
    // Place label at 44% of available line length toward screen (or canvas edge)
    const frac = 0.44;
    const lx = WALL + (SCR-WALL)*frac;
    const ly = CY + (ys-CY)*frac;
    // Only draw label if it falls within canvas
    if (ly >= 6 && ly <= H-6) {
      const lineAngle = Math.atan2(ys-CY, D);
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(lineAngle);
      ctx.font = 'bold 11px "Share Tech Mono",monospace';
      const tw = ctx.measureText(lblText).width;
      const ph = 15, pw = tw + 12, pr = 4;
      ctx.fillStyle = `rgba(5,10,18,${0.82*fadeIn})`;
      ctx.beginPath(); ctx.roundRect(-pw/2,-ph/2,pw,ph,pr); ctx.fill();
      ctx.strokeStyle = `rgba(${dr},${dg},${db},${0.45*fadeIn})`;
      ctx.lineWidth = 0.9;
      ctx.beginPath(); ctx.roundRect(-pw/2,-ph/2,pw,ph,pr); ctx.stroke();
      ctx.fillStyle = `rgba(${dr},${dg},${db},${0.95*fadeIn})`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(lblText, 0, 0);
      ctx.textBaseline = 'alphabetic';
      ctx.restore();
    }

    // Dot + m-label only for orders that hit the screen
    if (onScreen) {
      const dotR=isC?5.5:4.5;
      ctx.beginPath();
      ctx.arc(SCR+SCR_W/2, ys, dotR, 0, 2*Math.PI);
      ctx.fillStyle=`rgba(${dr},${dg},${db},${fadeIn})`;
      ctx.fill();
      ctx.strokeStyle=`rgba(255,255,255,${0.18*fadeIn})`;
      ctx.lineWidth=0.8; ctx.stroke();

      const grd=ctx.createRadialGradient(SCR+SCR_W/2,ys,0,SCR+SCR_W/2,ys,12);
      grd.addColorStop(0,`rgba(${dr},${dg},${db},${0.28*fadeIn})`);
      grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(SCR+SCR_W/2,ys,12,0,2*Math.PI); ctx.fill();

      ctx.font=`${isC?'bold ':''}11px "Share Tech Mono",monospace`;
      ctx.fillStyle=`rgba(${dr},${dg},${db},${fadeIn})`;
      ctx.textAlign='left';
      ctx.fillText(`m=${absM}`, SCR+SCR_W+7, ys+4);
    }
  });
}

function updateOrderBar(allMaxima) {
  // Count total orders (m >= 0)
  const positiveOrders = allMaxima.filter(mv => mv.m >= 0);
  const maxM = positiveOrders.length > 0 ? Math.max(...positiveOrders.map(mv=>mv.m)) : 0;
  document.getElementById('nOrders').textContent = maxM;
  // order-bar removed
}

/* ── Reset ──────────────────────────────────────────────────────── */
function reset() {
  phaseTime = 0;
  waveHead  = 0;
  settled   = false;
  dirty     = true;
}

/* ── Main loop ──────────────────────────────────────────────────── */
let lastOBUpdate = 0;
function frame(ts) {
  if (playing) {
    const spd = getSpeed();
    const step = 2.0 * spd;
    phaseTime += step;
    if (!settled) {
      waveHead += step;
      if (waveHead >= SCR + lam * 4) settled = true;
    }
  }

  if (dirty) buildMap();

  drawBG();
  // Only draw static interference map (the "rays") after wave has reached the screen
  // Clip strictly to the region between wall and screen so nothing bleeds past the screen
  const mapFade = Math.min(1, Math.max(0, waveHead - SCR) / (lam * 6));
  if (mapFade > 0) {
    ctx.save();
    ctx.beginPath(); ctx.rect(WALL, 0, SCR - WALL, H); ctx.clip();
    ctx.globalAlpha = mapFade;
    ctx.drawImage(off, 0, 0);
    ctx.restore();
  }
  drawPlaneWave();
  drawRings();
  // Hard-blank everything from the screen leftward edge onwards — covers any ring/map bleed
  ctx.fillStyle = '#07090f';
  ctx.fillRect(SCR, 0, W - SCR, H);
  drawWall();
  drawScreen();

  const mx = getAllMaxima();
  drawMaxima(mx);
  if (ts - lastOBUpdate > 500) { updateOrderBar(mx); lastOBUpdate = ts; }

  raf = requestAnimationFrame(frame);
}

/* ── Controls ───────────────────────────────────────────────────── */
document.getElementById('btnPlay').addEventListener('click', () => {
  playing = !playing;
  const btn = document.getElementById('btnPlay');
  const lbl = document.getElementById('lblPlay');
  const ico = document.getElementById('icoPlay');
  if (playing) {
    btn.classList.add('active');
    lbl.textContent = 'PAUSE';
    // pause icon
    ico.innerHTML = '<rect x="0" y="0" width="4" height="14" rx="1"/><rect x="9" y="0" width="4" height="14" rx="1"/>';
  } else {
    btn.classList.remove('active');
    lbl.textContent = 'AFSPIL';
    // play icon
    ico.innerHTML = '<polygon points="1,0 13,7 1,14"/>';
  }
});

document.getElementById('btnReset').addEventListener('click', () => {
  reset();
  // auto-play on reset
  if (!playing) {
    playing = true;
    document.getElementById('btnPlay').classList.add('active');
    document.getElementById('lblPlay').textContent = 'PAUSE';
    document.getElementById('icoPlay').innerHTML =
      '<rect x="0" y="0" width="4" height="14" rx="1"/><rect x="9" y="0" width="4" height="14" rx="1"/>';
  }
});

document.getElementById('sSpeed').addEventListener('input', function() {
  speedIdx = +this.value - 1;  // slider 1-10 → index 0-9
  const spd = getSpeed();
  document.getElementById('vSpeed').textContent =
    spd < 1 ? `×${spd.toFixed(2)}` : `×${spd.toFixed(1)}`;
});
// set initial label
(()=>{
  const spd = getSpeed();
  document.getElementById('vSpeed').textContent =
    spd < 1 ? `×${spd.toFixed(2)}` : `×${spd.toFixed(1)}`;
  document.getElementById('sSpeed').value = speedIdx + 1;
})();

document.getElementById('sLam').addEventListener('input', function() {
  lam_nm = +this.value;
  lam = lam_nm * NM_TO_PX;
  document.getElementById('vLam').textContent = `\u03bb = ${lam_nm} nm`;
  refreshColor(); dirty = true;
});
document.getElementById('sD').addEventListener('input', function() {
  d_nm = +this.value;
  d = d_nm * NM_TO_PX;
  document.getElementById('vD').textContent = `d = ${d_nm} nm`;
  dirty = true;
});

reset();
raf = requestAnimationFrame(frame);

/* ── Copy code button ───────────────────────────────────── */
document.getElementById('btnCopy').addEventListener('click', async () => {
  const lbl = document.getElementById('lblCopy');
  const btn = document.getElementById('btnCopy');
  try {
    await navigator.clipboard.writeText(document.documentElement.outerHTML);
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = document.documentElement.outerHTML;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  lbl.textContent = 'KOPIERET ✓';
  btn.classList.add('active');
  setTimeout(() => {
    lbl.textContent = 'KOPIER KODE';
    btn.classList.remove('active');
  }, 2500);
});
</script>
